version: "3.9"

services:
  vision-preprocess-service:
    build:
      context: ./services/vision-preprocess-service
    ports:
      - "8080:8080"
    environment:
      SIDECAR_API_KEY: ${HF_SIDECAR_API_KEY:-}
      STUB_MODE: ${SIDECAR_STUB_MODE:-false}

  text-retrieval-service:
    build:
      context: ./services/text-retrieval-service
    ports:
      - "8081:8081"
    environment:
      SIDECAR_API_KEY: ${HF_SIDECAR_API_KEY:-}
      STUB_MODE: ${SIDECAR_STUB_MODE:-false}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_TIMEOUT_SECONDS: ${SUPABASE_TIMEOUT_SECONDS:-8}
      TEXT_MODEL_ENABLED: ${TEXT_MODEL_ENABLED:-true}
      TEXT_EMBED_MODEL_NAME: ${TEXT_EMBED_MODEL_NAME:-BAAI/bge-m3}
      TEXT_RERANK_MODEL_NAME: ${TEXT_RERANK_MODEL_NAME:-BAAI/bge-reranker-v2-m3}
      TEXT_MODEL_MAX_CANDIDATES: ${TEXT_MODEL_MAX_CANDIDATES:-24}

  image-retrieval-service:
    build:
      context: ./services/image-retrieval-service
    ports:
      - "8082:8082"
    environment:
      SIDECAR_API_KEY: ${HF_SIDECAR_API_KEY:-}
      STUB_MODE: ${SIDECAR_STUB_MODE:-false}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_TIMEOUT_SECONDS: ${SUPABASE_TIMEOUT_SECONDS:-8}
      IMAGE_MODEL_ENABLED: ${IMAGE_MODEL_ENABLED:-true}
      IMAGE_RETRIEVAL_MODEL_NAME: ${IMAGE_RETRIEVAL_MODEL_NAME:-microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224}
      IMAGE_MODEL_MAX_ASSETS: ${IMAGE_MODEL_MAX_ASSETS:-12}
      IMAGE_FETCH_TIMEOUT_SECONDS: ${IMAGE_FETCH_TIMEOUT_SECONDS:-6}

  multimodal-consult-service:
    build:
      context: ./services/multimodal-consult-service
    ports:
      - "8083:8083"
    environment:
      SIDECAR_API_KEY: ${HF_SIDECAR_API_KEY:-}
      STUB_MODE: ${SIDECAR_STUB_MODE:-true}

  async-review-service:
    build:
      context: ./services/async-review-service
    ports:
      - "8084:8084"
    environment:
      SIDECAR_API_KEY: ${HF_SIDECAR_API_KEY:-}
      STUB_MODE: ${SIDECAR_STUB_MODE:-true}
