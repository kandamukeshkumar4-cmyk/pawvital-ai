name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate-trigger:
    name: Evaluate Auto-Fix Trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
    steps:
      - name: Check workflow_run eligibility
        id: guard
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" = "failure" ] && \
             [ "${{ github.event.workflow_run.event }}" = "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "Auto-fix only runs for failed pull_request CI workflow completions."

  auto-fix:
    name: Auto-Fix
    runs-on: ubuntu-latest
    needs: evaluate-trigger
    if: needs.evaluate-trigger.outputs.should_run == 'true'
    steps:
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/${SHA}/pulls \
            --jq '.[0].number // empty' 2>/dev/null || echo "")
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for this workflow run — skipping"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Check auto-fix attempt limit
        if: steps.pr.outputs.found == 'true'
        id: limit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          # Use GitHub API to count [ci-autofix] commits — no checkout required
          FIX_COUNT=$(gh api "repos/${{ github.repository }}/commits?sha=${BRANCH}&per_page=20" \
            --jq '[.[] | select(.commit.message | contains("[ci-autofix]"))] | length' \
            2>/dev/null || echo "0")
          echo "fix_count=$FIX_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$FIX_COUNT" -ge 3 ]; then
            echo "reached=true" >> "$GITHUB_OUTPUT"
          else
            echo "reached=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post limit-reached comment
        if: steps.pr.outputs.found == 'true' && steps.limit.outputs.reached == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<'EOF'
          ## Auto-Fix Limit Reached

          The CI auto-fix workflow attempted 3 auto-fixes on this PR but CI is still failing. Manual intervention required.

          Please fix the remaining issues and push to this branch.
          EOF
          )
          gh pr comment ${{ steps.pr.outputs.number }} --body "$BODY"

      - name: Checkout PR branch
        if: steps.pr.outputs.found == 'true' && steps.limit.outputs.reached == 'false'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        if: steps.pr.outputs.found == 'true' && steps.limit.outputs.reached == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.pr.outputs.found == 'true' && steps.limit.outputs.reached == 'false'
        run: npm ci

      - name: Attempt ESLint auto-fix
        if: steps.pr.outputs.found == 'true' && steps.limit.outputs.reached == 'false'
        id: lint-fix
        run: |
          npx eslint . --fix 2>/dev/null || true
          if ! git diff --quiet; then
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit lint fixes
        if: steps.lint-fix.outputs.fixed == 'true'
        run: |
          git config user.name "PawVital CI"
          git config user.email "ci@pawvital.ai"
          git add -A
          git commit -m "fix: auto-fix eslint errors [ci-autofix]"
          git push origin HEAD

      - name: Summarize failure details
        if: >
          steps.pr.outputs.found == 'true' &&
          steps.limit.outputs.reached == 'false' &&
          steps.lint-fix.outputs.fixed != 'true'
        id: summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          FAILED_CHECKS=$(gh api repos/${{ github.repository }}/commits/${SHA}/check-runs \
            --jq '[.check_runs[] | select(.conclusion == "failure") | {name: .name, details_url: .details_url}]' \
            2>/dev/null || echo "[]")
          FAILED_LIST=$(echo "$FAILED_CHECKS" | jq -r '
            if length == 0 then
              "- Failed checks were unavailable from the workflow run."
            else
              .[] | "- \(.name): \(.details_url // "no details URL available")"
            end')

          TSC_ERRORS=""
          if echo "$FAILED_CHECKS" | grep -q "Type Check"; then
            TSC_ERRORS=$(npx tsc --noEmit 2>&1 | head -100 || true)
          fi

          echo "checks<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FAILED_LIST" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "tsc<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TSC_ERRORS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post failure summary comment
        if: >
          steps.pr.outputs.found == 'true' &&
          steps.limit.outputs.reached == 'false' &&
          steps.lint-fix.outputs.fixed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_CHECKS: ${{ steps.summary.outputs.checks }}
          TYPECHECK_EXCERPT: ${{ steps.summary.outputs.tsc }}
        run: |
          BODY=$(cat <<EOF
          ## CI Failed — Manual Fix Required

          Automatic ESLint fixes did not resolve this failure. Review the failing checks below and push the next fix to this branch.

          ### Failed checks
          ${FAILED_CHECKS}

          ### TypeScript excerpt
          \`\`\`text
          ${TYPECHECK_EXCERPT:-No TypeScript excerpt was captured for this run.}
          \`\`\`

          Push the next fix to this branch and CI will re-run automatically.
          EOF
          )
          gh pr comment ${{ steps.pr.outputs.number }} --body "$BODY"
