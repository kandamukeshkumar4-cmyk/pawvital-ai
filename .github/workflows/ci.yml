name: CI Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches:
      - master
      - "claude/**"
      - "cursor/**"
      - "codex/**"
      - "copilot/**"
      - "antigravity/**"
      - "qoder/**"
      - "qwen/**"
      - "feat/**"
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "test/**"
      - "perf/**"
      - "refactor/**"
      - "rebase/**"
      - "devops/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - uses: actions/cache/save@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('package-lock.json') }}

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('package-lock.json') }}
      - run: npm run lint
        id: lint
      - name: Comment on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner, repo, issue_number: pr,
              body: `## Lint Failed\n\nThe linter found issues. Run \`npm run lint\` locally to see details.\n\n[View logs](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`
            });

  typecheck:
    name: Type Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('package-lock.json') }}
      - run: npx tsc --noEmit
        id: typecheck
      - name: Comment on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner, repo, issue_number: pr,
              body: `## Type Check Failed\n\nTypeScript found type errors. Run \`npx tsc --noEmit\` locally to see details.\n\n[View logs](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`
            });

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('package-lock.json') }}
      - run: npm run build
        env:
          # Provide stub env vars so Next.js build doesn't fail on missing secrets
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          QWEN_API_KEY: "placeholder"
          GLM_API_KEY: "placeholder"
          MINIMAX_API_KEY: "placeholder"
          HF_CONSULT_URL: "https://placeholder"
          HF_ASYNC_REVIEW_URL: "https://placeholder"
        id: build
      - name: Comment on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner, repo, issue_number: pr,
              body: `## Build Failed\n\nNext.js build failed. Run \`npm run build\` locally to debug.\n\n[View logs](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`
            });

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('package-lock.json') }}
      - run: npm test
        id: test
      - name: Comment on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner, repo, issue_number: pr,
              body: `## Tests Failed\n\nOne or more tests failed. Run \`npm test\` locally to debug.\n\n[View logs](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`
            });

  emergency-sentinel-advisory:
    name: Emergency Sentinel Advisory
    needs: install
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('package-lock.json') }}
      - name: Run sentinel advisory
        id: sentinel_advisory
        run: npm run eval:sentinels:advisory
        continue-on-error: true
      - name: Run dangerous benchmark advisory
        id: dangerous_benchmark
        if: always()
        run: npm run eval:benchmark:dangerous
        continue-on-error: true
      - name: Upload benchmark advisory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emergency-sentinel-advisory-benchmark-artifacts
          if-no-files-found: warn
          path: |
            data/benchmark/scorecard-*.json
      - name: Preserve advisory job result
        if: always()
        run: |
          if [ "${{ steps.sentinel_advisory.outcome }}" != "success" ] || \
             [ "${{ steps.dangerous_benchmark.outcome }}" != "success" ]; then
            echo "Emergency sentinel advisory reported failures"
            exit 1
          fi

  benchmark-integrity:
    name: Benchmark Integrity
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('package-lock.json') }}
      - name: Validate benchmark schema
        id: benchmark_validate
        run: npm run eval:benchmark:validate
        continue-on-error: true
      - name: Lint benchmark coverage
        id: benchmark_lint
        if: always()
        run: npm run eval:benchmark:lint
        continue-on-error: true
      - name: Upload benchmark integrity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-integrity-artifacts
          if-no-files-found: warn
          path: |
            data/benchmark/scorecard-*.json
            data/benchmarks/dog-triage/benchmark-lint-report.md
      - name: Preserve benchmark integrity result
        if: always()
        run: |
          if [ "${{ steps.benchmark_validate.outcome }}" != "success" ] || \
             [ "${{ steps.benchmark_lint.outcome }}" != "success" ]; then
            echo "Benchmark integrity checks failed"
            exit 1
          fi

  route-sentinel-replay:
    name: Route Sentinel Replay
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('package-lock.json') }}
      - run: npm run eval:benchmark:route-sentinels

  route-dangerous-replay-advisory:
    name: Route Dangerous Replay Advisory
    needs: install
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('package-lock.json') }}
      - name: Run route dangerous replay advisory
        id: route_dangerous_replay
        shell: bash
        run: |
          mkdir -p data/benchmark

          if [ ! -f scripts/route-dangerous-replay.mjs ]; then
            node -e 'const fs = require("node:fs"); const path = require("node:path"); const outputPath = path.join("data", "benchmark", "route-dangerous-replay-advisory.json"); const report = { generatedAt: new Date().toISOString(), reporter: "route-dangerous-replay-advisory", status: "skipped", reason: "script_missing", message: "scripts/route-dangerous-replay.mjs is not present on this ref yet." }; fs.writeFileSync(outputPath, `${JSON.stringify(report, null, 2)}\n`);'
            echo "report_status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cli_exit=0
          node scripts/route-dangerous-replay.mjs \
            --output=data/benchmark/route-dangerous-replay-advisory.json || cli_exit=$?

          if [ ! -f data/benchmark/route-dangerous-replay-advisory.json ]; then
            node -e 'const fs = require("node:fs"); const path = require("node:path"); const outputPath = path.join("data", "benchmark", "route-dangerous-replay-advisory.json"); const report = { generatedAt: new Date().toISOString(), reporter: "route-dangerous-replay-advisory", status: "error", reason: "artifact_missing", message: "route-dangerous-replay did not produce an output artifact." }; fs.writeFileSync(outputPath, `${JSON.stringify(report, null, 2)}\n`);'
          fi

          report_status=$(node -e "const fs = require('node:fs'); const report = JSON.parse(fs.readFileSync('data/benchmark/route-dangerous-replay-advisory.json', 'utf8')); process.stdout.write(typeof report.status === 'string' ? report.status : 'missing');")

          echo "report_status=$report_status" >> "$GITHUB_OUTPUT"

          if [ "$cli_exit" -ne 0 ] || \
             [ "$report_status" = "failed" ] || \
             [ "$report_status" = "error" ] || \
             [ "$report_status" = "missing" ]; then
            echo "Route dangerous replay advisory reported $report_status"
            exit 1
          fi
      - name: Upload route dangerous replay advisory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-dangerous-replay-advisory-artifacts
          if-no-files-found: warn
          path: |
            data/benchmark/route-dangerous-replay-advisory.json
      - name: Preserve advisory job result
        if: always()
        run: |
          if [ "${{ steps.route_dangerous_replay.outcome }}" != "success" ]; then
            echo "Route dangerous replay advisory reported failures"
            exit 1
          fi

  ci-gate:
    name: CI Gate
    needs: [lint, typecheck, build, test, benchmark-integrity, route-sentinel-replay]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.benchmark-integrity.result }}" != "success" ] || \
             [ "${{ needs.route-sentinel-replay.result }}" != "success" ]; then
            echo "One or more CI checks failed"
            exit 1
          fi
          echo "All CI checks passed"
