# GPU override - apply on top of docker-compose.yml to enable real model inference.
#
# Usage:
#   npm run compose:sidecars:gpu-host:live
# or manually:
#   docker compose \
#     -f deploy/sidecars-gpu-host/docker-compose.yml \
#     -f deploy/sidecars-gpu-host/docker-compose.gpu.override.yml \
#     --env-file deploy/sidecars-gpu-host/sidecars.env \
#     up --build -d
#
# Requirements:
#   - nvidia-container-toolkit installed on the host
#   - multimodal-consult: GPU with >= 16 GB VRAM (T4/A10G for Qwen2.5-VL-7B)
#   - async-review:       GPU with >= 80 GB VRAM (A100-80G/H100 for Qwen2.5-VL-32B)
#   - Persistent named volumes model_cache_consult / model_cache_review
#     (or bind-mount pre-populated directories)

services:
  multimodal-consult-service:
    build:
      context: ../../services/multimodal-consult-service
      dockerfile: Dockerfile.gpu
    environment:
      STUB_MODE: "false"
      HF_HOME: /model-cache
      CONSULT_MODEL_ID: ${CONSULT_MODEL_ID:-Qwen/Qwen2.5-VL-7B-Instruct}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      # Extended start_period: covers model weight load after first boot.
      start_period: 600s

  async-review-service:
    build:
      context: ../../services/async-review-service
      dockerfile: Dockerfile.gpu
    environment:
      STUB_MODE: "false"
      HF_HOME: /model-cache
      REVIEW_MODEL_ID: ${REVIEW_MODEL_ID:-Qwen/Qwen2.5-VL-32B-Instruct}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      # Extended start_period: 32B model load takes several minutes on first run.
      start_period: 3600s
